<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Campus Life App - Home</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-navy">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            Campus Life App
        </a>

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
            id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                        href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                        href="events.html">Events</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                        href="dining.html">Dining</a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- Hero Section -->
<header class="hero text-center">

    <div class="container">

        <h1>
            Welcome to Centenary University Campus Life
        </h1>

        <p>
            Your hub for campus events, dining, and updates.
        </p>

        <button
            class="btn btn-gold"
            onclick="showMessage()">

            Click for Welcome Message

        </button>

        <p id="welcomeMessage"></p>

    </div>

</header>

<!-- Weather Section -->
<section class="container text-center mt-5">

    <h2>Campus Weather</h2>

    <button
        class="btn btn-navy"
        onclick="getWeather()">

        Get Weather

    </button>

    <p id="weatherResult"></p>

</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="js/script.js"></script>

</body>

</html>
